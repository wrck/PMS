name: CI

on:
  pull_request:
    branches:
      - main
      - master

env:
  PROJECT_DIR: network-equipment-pms

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: ${{ env.PROJECT_DIR }}/pom.xml

      - name: Build & Unit Test
        run: mvn -B clean verify -DskipITs

      - name: Upload JAR Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jars
          path: |
            ${{ env.PROJECT_DIR }}/**/target/*.jar
          if-no-files-found: warn
          retention-days: 7

  frontend:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}/pms-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ env.PROJECT_DIR }}/pms-frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Type Check
        run: npx vue-tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload dist Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ${{ env.PROJECT_DIR }}/pms-frontend/dist
          if-no-files-found: warn
          retention-days: 7

  sonar:
    name: SonarQube Analysis
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    steps:
      - name: Checkout (full history for blame)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: ${{ env.PROJECT_DIR }}/pom.xml

      - name: SonarQube Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        run: >-
          mvn -B verify -DskipITs
          org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.projectKey=network-equipment-pms
          -Dsonar.host.url=$SONAR_HOST_URL

  docker:
    name: Build & Push Docker Images
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.PROJECT_DIR }}
          file: ${{ env.PROJECT_DIR }}/Dockerfile.backend
          push: true
          tags: ghcr.io/${{ github.repository }}/pms-backend:latest

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.PROJECT_DIR }}
          file: ${{ env.PROJECT_DIR }}/Dockerfile.frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/pms-frontend:latest
