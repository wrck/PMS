<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- PMS 应用图标（批次4-T10 PWA）
       蓝色圆角方块背景 + 白色 "P" 字母 + 网络节点装饰
       简洁现代风格，适配 maskable 裁剪 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409eff" />
      <stop offset="100%" stop-color="#337ecc" />
    </linearGradient>
  </defs>
  <!-- 背景圆角方块（safe zone 内，适配 maskable） -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)" />
  <!-- 白色 P 字母 -->
  <text x="256" y="340" font-family="Arial, sans-serif" font-size="280" font-weight="bold"
        fill="#fff" text-anchor="middle" dominant-baseline="middle">P</text>
  <!-- 网络节点装饰（右下角小圆点，暗示网络设备运维） -->
  <circle cx="380" cy="380" r="24" fill="#fff" opacity="0.9" />
  <circle cx="380" cy="380" r="12" fill="#409eff" />
</svg>
