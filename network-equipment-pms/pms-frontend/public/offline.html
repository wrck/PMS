<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>离线 — PMS 低代码平台</title>
  <meta name="theme-color" content="#409eff" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e7eb 100%);
      color: #303133;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .offline-container {
      text-align: center;
      padding: 40px 24px;
      max-width: 480px;
      width: 100%;
    }
    .offline-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }
    .offline-icon svg {
      width: 64px;
      height: 64px;
      color: #909399;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #303133;
    }
    p {
      font-size: 14px;
      line-height: 1.6;
      color: #606266;
      margin-bottom: 24px;
    }
    .retry-btn {
      display: inline-block;
      padding: 10px 28px;
      background: #409eff;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .retry-btn:hover, .retry-btn:active {
      background: #337ecc;
    }
    .offline-hint {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #ebeef5;
      font-size: 12px;
      color: #909399;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon" aria-hidden="true">
      <!-- 离线图标：WiFi 断开 -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
    </div>
    <h1>当前处于离线状态</h1>
    <p>无法连接到服务器，请检查网络连接后重试。已缓存的页面和数据仍可查看，但写操作将暂时不可用。</p>
    <button class="retry-btn" onclick="location.reload()">重新连接</button>
    <div class="offline-hint">
      <p>PMS 低代码平台 · 离线模式</p>
      <p>网络恢复后页面将自动重新加载</p>
    </div>
  </div>
  <script>
    // 监听网络恢复，自动重载页面
    window.addEventListener('online', () => {
      location.reload()
    })
  </script>
</body>
</html>
