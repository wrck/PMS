version: '3.8'

# 基础设施层（不含应用，可独立启动用于开发环境）
# 用法：
#   docker-compose -f docker-compose.infra.yml up -d
#   docker-compose -f docker-compose.infra.yml down

services:
  mysql:
    image: mysql:8.0.36
    container_name: pms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pms}
      MYSQL_USER: ${MYSQL_USER:-pms}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-pmspassword}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pms-network
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: pms-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pms-network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  pms-network:
    driver: bridge
