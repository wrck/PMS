sonar.projectKey=network-equipment-pms
sonar.projectName=网络设备工程项目管理系统
sonar.projectVersion=1.0.0-SNAPSHOT

# 源码目录
sonar.sources=.
sonar.exclusions=**/target/**,**/node_modules/**,**/dist/**,**/build/**,**/mock-*/**

# Java 后端
sonar.java.binaries=**/target/classes
sonar.java.source=17
sonar.tests=**/src/test/java
sonar.junit.reportPaths=**/target/surefire-reports/*.xml
sonar.jacoco.reportPaths=**/target/jacoco.exec

# 前端
sonar.typescript.tsconfigPath=pms-frontend/tsconfig.json
sonar.coverage.exclusions=**/src/test/**,**/*.spec.ts,**/*.test.ts

# 质量门禁（在 SonarQube UI 配置，这里只放注释说明）
# Coverage ≥ 70%
# Duplications ≤ 3%
# Critical Issues = 0
# Cyclomatic Complexity ≤ 15

# 编码规范
sonar.sourceEncoding=UTF-8
