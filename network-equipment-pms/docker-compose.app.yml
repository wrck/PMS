version: '3.8'

# 应用层（依赖基础设施 docker-compose.infra.yml）
# 用法：
#   docker-compose -f docker-compose.infra.yml -f docker-compose.app.yml up -d
#   docker-compose -f docker-compose.app.yml --profile mock up -d   # 含 mock 服务

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: pms-backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-pms}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-pms}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-pmspassword}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-redispassword}
      APP_SECURITY_ENCRYPT_KEY: ${APP_ENCRYPT_KEY}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pms-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: pms-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - pms-network
    restart: unless-stopped

  mock-d365:
    build: ./mock-d365
    container_name: pms-mock-d365
    ports:
      - "${MOCK_D365_PORT:-8090}:8090"
    networks:
      - pms-network
    profiles: ["mock"]
    restart: unless-stopped

  mock-fp:
    build: ./mock-fp
    container_name: pms-mock-fp
    ports:
      - "${MOCK_FP_PORT:-8091}:8091"
    networks:
      - pms-network
    profiles: ["mock"]
    restart: unless-stopped

  mock-oa:
    build: ./mock-oa
    container_name: pms-mock-oa
    ports:
      - "${MOCK_OA_PORT:-8092}:8092"
    networks:
      - pms-network
    profiles: ["mock"]
    restart: unless-stopped

networks:
  pms-network:
    driver: bridge
