version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: pms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: network_equipment_pms
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-d365:
    build:
      context: ./mock-d365
      dockerfile: Dockerfile
    container_name: pms-mock-d365
    ports:
      - "8091:8091"
    restart: on-failure

  mock-fp:
    build:
      context: ./mock-fp
      dockerfile: Dockerfile
    container_name: pms-mock-fp
    ports:
      - "8092:8092"
    restart: on-failure

  mock-oa:
    build:
      context: ./mock-oa
      dockerfile: Dockerfile
    container_name: pms-mock-oa
    ports:
      - "8093:8093"
    restart: on-failure

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: pms-backend
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-d365:
        condition: service_started
      mock-fp:
        condition: service_started
      mock-oa:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/network_equipment_pms?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # Use the mock profile so integration URLs point to the mock services.
      SPRING_PROFILES_ACTIVE: mock
      D365_BASE_URL: http://mock-d365:8091/api
      D365_TOKEN_URL: http://mock-d365:8091/oauth2/token
      D365_CLIENT_ID: ${D365_CLIENT_ID:-mock-client}
      D365_CLIENT_SECRET: ${D365_CLIENT_SECRET:-mock-secret}
      FP_BASE_URL: http://mock-fp:8092/api
      FP_TOKEN_URL: http://mock-fp:8092/oauth2/token
      FP_CLIENT_ID: ${FP_CLIENT_ID:-mock-client}
      FP_CLIENT_SECRET: ${FP_CLIENT_SECRET:-mock-secret}
      OA_BASE_URL: http://mock-oa:8093/api
      OA_TOKEN_URL: http://mock-oa:8093/oauth2/token
      OA_CLIENT_ID: ${OA_CLIENT_ID:-mock-client}
      OA_CLIENT_SECRET: ${OA_CLIENT_SECRET:-mock-secret}
    restart: on-failure

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: pms-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: on-failure

volumes:
  mysql-data:
  redis-data:
