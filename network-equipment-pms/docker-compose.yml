version: '3.8'

# 兼容入口：默认启动所有服务
# 实际配置拆分到 docker-compose.infra.yml / app.yml / observe.yml
# 用法：
#   docker-compose up -d                    # 启动所有
#   docker-compose -f docker-compose.infra.yml up -d    # 仅基础设施
#   docker-compose -f docker-compose.app.yml up -d      # 仅应用
#   docker-compose -f docker-compose.observe.yml up -d  # 仅可观测性

include:
  - docker-compose.infra.yml
  - docker-compose.app.yml
  - docker-compose.observe.yml
