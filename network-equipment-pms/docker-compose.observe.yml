version: '3.8'

# 可观测性层（可选，独立部署）
# 用法：
#   docker-compose -f docker-compose.observe.yml up -d

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: pms-prometheus
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - pms-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: pms-grafana
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./deploy/grafana/alerting:/etc/grafana/alerting:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    networks:
      - pms-network
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: pms-alertmanager
    volumes:
      - ./deploy/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    networks:
      - pms-network
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: pms-jaeger
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_GRPC_PORT:-4317}:4317"
      - "${JAEGER_HTTP_PORT:-4318}:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - pms-network
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:

networks:
  pms-network:
    driver: bridge
