server:
  port: 8080
  context-path: /
spring:
  application:
    name: network-equipment-pms
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/network_equipment_pms?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
mybatis-plus:
  mapper-locations: classpath*:com/dp/plat/**/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
jwt:
  secret: ZGVwdGVjaC1wbXMtc2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24tMjAyNA==
  expiration: 86400000
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
d365:
  base-url: https://d365.example.com/api
  token-url: https://d365.example.com/oauth2/token
  client-id: ${D365_CLIENT_ID:dummy}
  client-secret: ${D365_CLIENT_SECRET:dummy}
  scope: ${D365_SCOPE:}
  grant-type: client_credentials
fp:
  base-url: https://fp.example.com/api
  token-url: https://fp.example.com/oauth2/token
  client-id: ${FP_CLIENT_ID:dummy}
  client-secret: ${FP_CLIENT_SECRET:dummy}
integration:
  retry:
    interval: 300000  # 5 minutes
    max-retry: 3
    backoff-multiplier: 2
  oa:
    base-url: ${OA_BASE_URL:https://oa.example.com/api}
    token-url: ${OA_TOKEN_URL:https://oa.example.com/oauth2/token}
    client-id: ${OA_CLIENT_ID:dummy}
    client-secret: ${OA_CLIENT_SECRET:dummy}
