server:
  port: 8080
  context-path: /
spring:
  application:
    name: network-equipment-pms
  # yudao 三层架构存在循环依赖（如 OAuth2TokenServiceImpl ↔ AdminUserService），必须允许
  main:
    allow-circular-references: true
  # yudao 使用 dynamic-datasource-spring-boot3-starter（来自 yudao-spring-boot-starter-mybatis）
  # 必须用 spring.datasource.dynamic.datasource.master.* 配置，不能用 spring.datasource.*
  # 否则启动时报 "dynamic-datasource initial loaded [0] datasource"
  datasource:
    dynamic:
      primary: master
      strict: false            # 严格模式：未匹配数据源时报错；false 时回退到 master
      datasource:
        master:
          url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/network_equipment_pms?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
          username: ${MYSQL_USER:root}
          password: ${MYSQL_PASSWORD:pmspassword}
          driver-class-name: com.mysql.cj.jdbc.Driver
          hikari:
            minimum-idle: 5
            maximum-pool-size: 20
            idle-timeout: 30000
            max-lifetime: 1800000
            connection-timeout: 30000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      # password 不在此设置：留空会让 Redisson 误发 AUTH 命令到无密码 Redis
      # 改用 SPRING_DATA_REDIS_PASSWORD 环境变量（Spring Boot relaxed binding 自动绑定）
      # 环境变量未设 → spring.data.redis.password 为 null → Redisson 跳过 AUTH
      # 环境变量已设 → Redisson 发 AUTH
      timeout: 3000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    placeholder-replacement: false
    out-of-order: true
    # Dev env: skip checksum validation for already-applied migrations
    # (migration scripts may be modified during development)
    validate-on-migrate: false
    clean-disabled: true
  # Quartz 调度配置：内存存储（简化，无需建表；如需集群持久化可改为 jdbc）
  quartz:
    job-store-type: memory
    properties:
      org.quartz.threadPool.threadCount: 5
# Flowable 工作流引擎配置：启动时自动创建/更新 act_* 表结构
flowable:
  database-schema-update: true
  async-executor-activate: false
  process-definition-cache-limit: 100
# yudao framework 配置
yudao:
  info:
    base-package: com.dp.plat
  web:
    admin-api:
      prefix: /admin-api
      controller: "**.controller.admin.**"
    app-api:
      prefix: /app-api
      controller: "**.controller.app.**"
    admin-ui:
      url: http://localhost:3000
  security:
    mock-enable: true
  swagger:
    title: 网络设备 PMS 管理后台
    description: 网络设备 PMS 管理后台接口文档
    version: ${revision}
    base-package: com.dp.plat
  # 多租户：PMS 业务表（pms_*）与自研 sys_* 表均无 tenant_id 列，
  # yudao-spring-boot-starter-biz-tenant 默认启用会注入 tenant_id 条件导致查询失败。
  # 这里显式禁用，未来如需 SaaS 化再开启并补齐 tenant_id 列。
  tenant:
    enable: false
  # 短信验证码配置（yudao-module-system SmsCodeProperties 强制 @NotNull 校验）
  # PMS 当前未使用短信登录，但 SmsCodeApiImpl 被 AdminAuthService 装配依赖。
  # 这里提供 yudao 参考默认值以满足校验，9999/9999 便于测试。
  # 如需接入真实短信通道，参考 yudao 官方 sms-client 配置。
  sms-code:
    expire-times: 10m
    send-frequency: 1m
    send-maximum-quantity-per-day: 10
    begin-code: 9999
    end-code: 9999

# 微信公众号、小程序配置
# PMS 当前未使用微信登录，但 yudao-module-system 引入了 wx-java starter，
# 其默认 WxMpInMemoryConfigStorageConfiguration 会引用 HttpClient 4.x 的类导致
# ClassNotFoundException: org.apache.http.conn.HttpClientConnectionManager。
# 解决：config-storage.type=redistemplate 触发 yudao YudaoWxClientConfiguration 覆盖默认 Bean，
# 该实现只依赖 HttpClient 5.x（http-client-type: HttpComponents）。
# app-id/secret 用占位值，未实际接入微信。
wx:
  mp:
    app-id: wxf56b1542b9e85f8a
    secret: 496379dcef1ba869e9234de8d598cfd3
    config-storage:
      type: redistemplate
      key-prefix: wx
      http-client-type: HttpComponents
  miniapp:
    appid: wx62056c0d5e8db250
    secret: 333ae72f41552af1e998fe1f54e1584a
    config-storage:
      type: redistemplate
      key-prefix: wx
      http-client-type: HttpComponents
mybatis-plus:
  mapper-locations: classpath*:com/dp/plat/**/mapper/**/*.xml
  # yudao Entity 类型别名扫描（用于 ResultMap 自动映射 yudao-module-system/infra 的 DO）
  # 注意：只扫描 yudao DO 包，不扫描 PMS Entity 包。
  # PMS 中 pms-project 和 pms-deliverable 都有同名 Deliverable 类，扫描 com.dp.plat.**.entity
  # 会导致 MyBatis 类型别名冲突（The alias 'Deliverable' is already mapped）。
  # PMS 业务 Mapper 通过 @Param 全限定类型传递，无需依赖 type-aliases。
  type-aliases-package: cn.iocoder.yudao.module.**.dal.dataobject
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  # yudao MyBatis-Plus 字段加密插件密钥（生产环境必须覆盖）
  encryptor:
    password: XDV71a+xqStEA3WH
jwt:
  # Base64 编码的开发默认密钥；生产环境必须通过 JWT_SECRET 覆盖。
  secret: ${JWT_SECRET:ZGV2ZWxvcG1lbnQtand0LXNlY3JldC1rZXktY2hhbmdlLW1lLTMydC1ieXRlcw==}
  expiration: 86400000
app:
  security:
    # AES-256-GCM 字段级加密密钥，Base64 编码的 32 字节（256 位）。
    # 生产环境必须通过环境变量 APP_ENCRYPT_KEY 覆盖，切勿提交真实密钥。
    encrypt-key: ${APP_ENCRYPT_KEY:default-encrypt-key}
  # 连接器凭据 AES-GCM 加密密钥（明文口令，自动填充到 16/24/32 字节）。
  # 用于低代码连接器 config 中 password/token/apiKey/secret/clientSecret 字段加密。
  # 生产环境必须通过环境变量 APP_CONNECTOR_ENCRYPT_KEY 覆盖，切勿提交真实密钥。
  encrypt-key: ${APP_CONNECTOR_ENCRYPT_KEY:default-encrypt-key-32b}
# PMS 文件存储配置
# - storage.type：存储类型，local=本地磁盘（默认）、minio=MinIO、oss=阿里云 OSS
# - local.base-dir：本地存储根目录，使用相对路径（./pms-files）会创建在工作目录下
pms:
  file:
    storage:
      type: local
    local:
      base-dir: ${PMS_FILE_LOCAL_BASE_DIR:./pms-files}
# 低代码平台配置
lowcode:
  encryption:
    # 低代码连接器凭据 AES 加密密钥（明文口令）。生产环境必须通过环境变量
    # LOWCODE_ENCRYPTION_KEY 覆盖；使用默认值会在启动时打印警告日志。
    key: ${LOWCODE_ENCRYPTION_KEY:default-lowcode-encryption-key-change-me}
# LiteFlow 规则引擎配置
# rule-source 留空：低代码规则设计器执行时动态传入 EL 表达式，无需默认规则
liteflow:
  rule-source: ""
  enable-log: false
  retry-count: 0
  thread-executor-number: 2
# Actuator + Micrometer + Prometheus 可观测性配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,configprops,loggers,scheduledtasks,threaddump
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      show-components: always
    prometheus:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
      slo:
        http.server.requests: 50ms, 100ms, 200ms, 500ms, 1s, 2s, 5s
    tags:
      application: pms
      env: ${spring.profiles.active:dev}
  prometheus:
    metrics:
      export:
        enabled: true
        step: 30s
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
d365:
  base-url: https://d365.example.com/api
  token-url: https://d365.example.com/oauth2/token
  client-id: ${D365_CLIENT_ID:dummy}
  client-secret: ${D365_OAUTH_CLIENT_SECRET:}
  scope: ${D365_SCOPE:}
  grant-type: client_credentials
fp:
  base-url: https://fp.example.com/api
  token-url: https://fp.example.com/oauth2/token
  client-id: ${FP_CLIENT_ID:dummy}
  client-secret: ${FP_OAUTH_CLIENT_SECRET:}
integration:
  retry:
    interval: 300000  # 5 minutes
    max-retry: 3
    backoff-multiplier: 2
  oa:
    base-url: ${OA_BASE_URL:https://oa.example.com/api}
    token-url: ${OA_TOKEN_URL:https://oa.example.com/oauth2/token}
    client-id: ${OA_CLIENT_ID:dummy}
    client-secret: ${OA_OAUTH_CLIENT_SECRET:}

# Resilience4j：D365 / FP / OA 三个外部集成的熔断 / 隔离 / 限流 / 重试配置。
# - CircuitBreaker：基于计数滑动窗口，失败率 ≥50% 触发熔断；30s 后自动转半开；
#   半开态允许 5 次试探调用；半开态失败率仍高则再次打开，否则关闭。
# - Bulkhead：信号量隔离，单实例最大并发 10，等待获取信号量最长 5s。
# - RateLimiter：每秒限流 50 次，超过则等待 10s。
# - Retry：最多 3 次尝试（含首调），1s 起步指数退避（2x，上限 16s），
#   仅对 IOException / TimeoutException 重试（业务异常不重试）。
# 健康检查（healthCheck）方法不加注解，避免熔断器 OPEN 时健康端点无法恢复。
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - com.dp.plat.common.exception.IntegrationException
    instances:
      d365CircuitBreaker:
        base-config: default
      fpCircuitBreaker:
        base-config: default
      oaCircuitBreaker:
        base-config: default
  bulkhead:
    configs:
      default:
        max-concurrent-calls: 10
        max-wait-duration: 5s
    instances:
      d365Bulkhead:
        base-config: default
      fpBulkhead:
        base-config: default
      oaBulkhead:
        base-config: default
  ratelimiter:
    configs:
      default:
        limit-for-period: 50
        limit-refresh-period: 1s
        timeout-duration: 10s
    instances:
      d365RateLimiter:
        base-config: default
      fpRateLimiter:
        base-config: default
      oaRateLimiter:
        base-config: default
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        exponential-max-wait-duration: 16s
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
    instances:
      d365Retry:
        base-config: default
      fpRetry:
        base-config: default
      oaRetry:
        base-config: default

# OpenTelemetry 分布式追踪配置
# - service.name：服务名，在 Jaeger 中标识本服务
# - exporter.otlp：通过 OTLP gRPC 上报至 Jaeger（默认 4317 端口）
# - traces.sampler：parentbased_traceidratio 采样率 0.1（10%），生产可按需调整
# - metrics/logs exporter：none，仅启用 traces（避免与 Micrometer/Prometheus 重复）
otel:
  service:
    name: ${OTEL_SERVICE_NAME:pms}
    version: ${project.version:1.0.0}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
      protocol: grpc
  traces:
    exporter: otlp
    sampler:
      type: parentbased_traceidratio
      arg: ${OTEL_TRACES_SAMPLER_ARG:0.1}
  metrics:
    exporter: none
  logs:
    exporter: none
