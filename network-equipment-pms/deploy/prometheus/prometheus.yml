# Prometheus 抓取与告警配置
# - 抓取间隔 15s，评估间隔 15s
# - 告警规则文件挂载于 /etc/prometheus/rules/
# - Alertmanager 地址 alertmanager:9093
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    application: pms

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'pms-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:8080']
        labels:
          application: pms
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
