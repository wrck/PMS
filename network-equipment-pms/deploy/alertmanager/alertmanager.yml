# Alertmanager 告警路由与通知配置
# - 按 alertname + application 分组
# - 默认通过 webhook 推送到 PMS 后端告警接收接口
# - send_resolved: 推送恢复通知
global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'application']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - matchers:
        - severity = critical
      receiver: 'default'
      group_wait: 10s
      repeat_interval: 1h

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://backend:8080/api/ops/alert/webhook'
        send_resolved: true
        max_alerts: 0

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ['alertname', 'application']
